<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>peterdn</title>
  <link rel="canonical" href="https://github.com/peterdn" />
  <!-- Root redirect to the GitHub profile. GitHub Pages can't do a real 301 here,
       so this is a client-side redirect: JS first, <meta> refresh as the no-JS
       fallback, and a plain link if both are blocked. Subpaths (e.g. /amulet/)
       are unaffected — they serve their own index.html. -->
  <meta http-equiv="refresh" content="0; url=https://github.com/peterdn" />
  <script>window.location.replace("https://github.com/peterdn");</script>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #0d0d0f;
      color: #e8e8ea;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    p { font-size: 15px; letter-spacing: .02em; opacity: .85; }
    a { color: #7cc0ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <p>Redirecting to <a href="https://github.com/peterdn">github.com/peterdn</a>…</p>
</body>
</html>
